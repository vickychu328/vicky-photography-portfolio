server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Long-lived cache for hashed Vite assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Photos served with moderate cache
    location /photos/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml image/jpeg image/png;
}
